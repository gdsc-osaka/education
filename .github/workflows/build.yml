name: Build content

on:
  push:
    branches-ignore:
      - 'auto-build/**'
    paths:
      - '**/claat.md'
      - '**/slide.md'
      - '.marp/**'
      - '.claat/**'
      - 'Makefile'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - '**/claat.md'
      - '**/slide.md'
      - '.marp/**'
      - '.claat/**'
      - 'Makefile'
      - '.github/workflows/build.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    # Skip auto-build branches and fork PRs (no push access).
    if: >-
      !startsWith(github.head_ref, 'auto-build/')
      && !startsWith(github.ref_name, 'auto-build/')
      && (github.event_name != 'pull_request'
          || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Determine target branch
        id: target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.branch }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install claat
        run: go install github.com/googlecodelabs/tools/claat@latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build claat codelabs
        run: |
          set -e
          while IFS= read -r f; do
            dir=$(dirname "$f")
            echo "::group::claat $dir"
            make claat "$f" "$dir"
            echo "::endgroup::"
          done < <(find . -name claat.md -not -path './.git/*' -not -path './.kiri/*')

      - name: Build slide decks
        run: |
          set -e
          while IFS= read -r f; do
            dir=$(dirname "$f")
            echo "::group::slide $dir"
            make slide "$f" "$dir/slide/index.html"
            echo "::endgroup::"
          done < <(find . -name slide.md -not -path './.git/*' -not -path './.kiri/*')

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          base: ${{ steps.target.outputs.branch }}
          branch: auto-build/${{ steps.target.outputs.branch }}
          commit-message: 'chore: regenerate claat and slide outputs'
          title: 'Regenerate generated content for ${{ steps.target.outputs.branch }}'
          body: |
            Auto-generated by `.github/workflows/build.yml`.

            Regenerated outputs from `claat.md` / `slide.md` sources on
            branch `${{ steps.target.outputs.branch }}`.
          delete-branch: true
